[tool.briefcase]
project_name = "MyAI Agent Hub"
bundle = "com.myaiagenthub"
version = "1.0.0"
url = "https://myaiagenthub.app"
license = "Proprietary"
sources = ["app"]
main_module = "app.main"

requires = [
  "pywebview>=4.4.1",
  "requests>=2.31.0",
  "psutil>=5.9.0",
  "numpy>=1.26.0",
  "anthropic>=0.40.0",
  "tenacity>=8.3.0",
  "pydantic>=2.7.0",
  "sentence-transformers>=2.7.0",
  "chromadb>=0.5.0",
]

[tool.briefcase.app.myaiagenthub]
formal_name = "MyAI Agent Hub"
description = "Local-first desktop AI platform with Claude and free local models"
icon = "icons/AppIcon"

[tool.briefcase.app.myaiagenthub.macOS]
requires = [
  "pywebview>=4.4.1",
  "pyobjc-core>=10.0",
  "pyobjc-framework-Cocoa>=10.0",
  "pyobjc-framework-WebKit>=10.0",
]
# Creates a .dmg installer via: briefcase package macOS
universal_build = true   # build for both Intel and Apple Silicon

[tool.briefcase.app.myaiagenthub.windows]
requires = [
  "pywebview>=4.4.1",
  "pythonnet>=3.0",
]
# Creates an .msi installer via: briefcase package windows
# Requires WiX Toolset 3.x: https://wixtoolset.org/

[tool.briefcase.app.myaiagenthub.linux]
requires = [
  "pywebview>=4.4.1",
]
system_requires = ["libwebkit2gtk-4.0-dev"]

# NeMo Guardrails Configuration
# Uses local Ollama model for rails execution (completely free)
# Falls back to LLM Guard + regex if Ollama unavailable

models:
  - type: main
    engine: ollama
    model: llama3
    parameters:
      base_url: http://localhost:11434

rails:
  input:
    flows:
      - self check input
      - check jailbreak
      - check topic policy
  output:
    flows:
      - self check output
      - check response safety

  config:
    # Enable parallel execution of input rails for lower latency
    enable_multi_step_generation: false
    # Lowest latency: skip rails if confidence is high
    lowest_temperature: 0.1

appId: com.imakeaiteams.app
productName: iMakeAiTeams
copyright: Copyright © 2026 iMakeAiTeams
asar: true

directories:
  output: dist
  buildResources: branding

files:
  - out/**/*
  - package.json
  - "!**/*.{md,map,ts,tsx}"
  - "!**/{tsconfig*,*.config.*,.eslintrc*}"

extraResources:
  - from: branding/sidecar-bundle
    to: backend
    filter: ["**/*"]
  - from: branding/icon.png
    to: icon.png

win:
  target:
    - target: nsis
      arch: [x64]
  icon: branding/icon.png
  artifactName: "${productName}-Setup-${version}.${ext}"
  # publisherName must match the CN of the signing certificate exactly.
  # electron-updater verifies the downloaded installer's publisher
  # against this value; without it, an MITM with a valid-but-unrelated
  # cert can serve a swap. Update if the signing cert changes.
  publisherName:
    - iMakeAiTeams

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: iMakeAiTeams
  uninstallDisplayName: iMakeAiTeams
  deleteAppDataOnUninstall: false

publish:
  - provider: github
    owner: zasonic
    repo: imakeaiteams
    releaseType: release

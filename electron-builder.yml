appId: com.imakeaiteams.app
productName: iMakeAiTeams
copyright: Copyright © 2026 iMakeAiTeams
asar: true

directories:
  output: dist
  buildResources: branding

files:
  - out/**/*
  - package.json
  - "!**/*.{md,map,ts,tsx}"
  - "!**/{tsconfig*,*.config.*,.eslintrc*}"

extraResources:
  - from: branding/sidecar-bundle
    to: backend
    filter: ["**/*"]
  - from: branding/icon.png
    to: icon.png

win:
  target:
    - target: nsis
      arch: [x64]
  icon: branding/icon.png
  artifactName: "${productName}-Setup-${version}.${ext}"
  # publisherName must match the CN of the signing certificate exactly.
  # electron-updater verifies the downloaded installer's publisher against
  # this value, so it MUST be set only when a real code-signing certificate
  # is wired in (win.certificateFile / certificateSubjectName / CSC_LINK).
  # Otherwise auto-update will reject every release as publisher-mismatched.
  # Re-add once a cert is in place.
  # publisherName:
  #   - iMakeAiTeams

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: iMakeAiTeams
  uninstallDisplayName: iMakeAiTeams
  deleteAppDataOnUninstall: false

publish:
  - provider: github
    owner: zasonic
    repo: imakeaiteams
    releaseType: release
